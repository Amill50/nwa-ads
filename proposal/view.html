<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Proposal · NWA Ads</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #faf8f3;
  --ink:     #1a1206;
  --ink2:    #3d3023;
  --muted:   #9b8f7a;
  --muted2:  #6b5d4a;
  --border:  #e8e3d8;
  --surface: #fff;
  --sf2:     #faf8f3;
  --accent:  #c84f18;
  --orange:  #f0905a;
  --dark:    #1a1206;
  --green:   #1a7a3a;
  --r:       14px;
  --r-sm:    8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body { font-family: 'Instrument Sans', 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* ── NAV ── */
.nav {
  background: var(--dark);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-wordmark { font-family: Georgia, serif; font-size: 17px; font-weight: 700; color: #fffef9; }
.nav-wordmark span { color: var(--orange); }
.nav-label { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── BANNER ── */
.banner {
  background: var(--orange);
  color: #fff;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 16px;
  letter-spacing: 0.3px;
}

/* ── LAYOUT ── */
.container { max-width: 780px; margin: 0 auto; padding: 40px 24px 96px; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  padding: 28px 32px;
  margin-bottom: 24px;
}

/* ── COVER ── */
.cover-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
.cover-company { font-family: Georgia, serif; font-size: 30px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.cover-contact { margin-top: 4px; font-size: 14px; color: var(--muted2); }
.cover-divider { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.cover-note-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
.cover-note { font-size: 14px; color: var(--ink2); line-height: 1.65; font-style: italic; }
.cover-sender { margin-top: 10px; font-size: 12px; color: var(--muted); font-weight: 600; }

/* ── STAT BADGES ── */
.stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-badge {
  text-align: center;
  padding: 20px 24px;
  background: var(--surface);
  border-radius: 12px;
  border: 1.5px solid var(--border);
  flex: 1;
  min-width: 130px;
}
.stat-val { font-family: Georgia, serif; font-size: 26px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1; }
.stat-val.accent { color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

/* ── GOAL CHIP ── */
.goal-row { margin-bottom: 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.goal-eyebrow { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.goal-chip {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
}

/* ── SECTION HEADING ── */
.section-head { margin-bottom: 16px; }
.section-head h2 { font-family: Georgia, serif; font-size: 22px; font-weight: 700; color: var(--ink); }
.section-head p { margin: 6px 0 0; font-size: 13px; color: var(--muted); }

/* ── SCREEN CARD ── */
.screen-card {
  background: var(--surface);
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-bottom: 24px;
}
.screen-media {
  position: relative;
  height: 220px;
  overflow: hidden;
  background: var(--border);
}
.screen-media img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: none;
}
.screen-media iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
}
.screen-media-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.68) 100%);
  pointer-events: none;
}
.screen-type-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,255,255,0.93);
  backdrop-filter: blur(4px);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: none;
}
.screen-photo-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.48);
  border-radius: 12px;
  padding: 3px 9px;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.3px;
  pointer-events: none;
}
.screen-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  pointer-events: none;
}
.screen-overlay-name {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.screen-overlay-area {
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  margin-top: 2px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.screen-body { padding: 18px 20px 20px; }
.screen-stats { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.screen-stat {
  flex: 1;
  min-width: 90px;
  background: var(--sf2);
  border-radius: var(--r-sm);
  padding: 10px 12px;
}
.screen-stat-lbl { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
.screen-stat-val { font-size: 20px; font-weight: 700; font-family: Georgia, serif; color: var(--ink); }
.screen-stat-val.accent { color: var(--accent); }
.screen-stat-val small { font-size: 12px; color: var(--muted); font-family: inherit; }
.screen-audience {
  font-size: 12px;
  color: var(--muted2);
  background: var(--sf2);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.screen-audience strong { font-weight: 700; }
.screen-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.screen-total-lbl { font-size: 12px; color: var(--muted); }
.screen-total-val { font-size: 16px; font-weight: 700; font-family: Georgia, serif; color: var(--ink); }

/* ── PRICING ── */
.pricing-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0ebe0;
  gap: 10px;
}
.pricing-row-left { display: flex; align-items: center; gap: 8px; }
.pricing-row-icon { font-size: 18px; }
.pricing-row-name { font-size: 13px; font-weight: 600; }
.pricing-row-sub { font-size: 11px; color: var(--muted); }
.pricing-row-right { text-align: right; flex-shrink: 0; }
.pricing-row-total { font-size: 14px; font-weight: 700; color: var(--accent); }
.pricing-row-unit { font-size: 10px; color: var(--muted); }
.pricing-summary { padding-top: 12px; margin-top: 4px; }
.pricing-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
.pricing-line span:first-child { font-size: 13px; color: var(--muted2); }
.pricing-line span:last-child { font-size: 13px; font-weight: 600; }
.pricing-line.green span { color: var(--green); }
.pricing-grand { display: flex; justify-content: space-between; padding-top: 12px; border-top: 2px solid var(--border); }
.pricing-grand-lbl { font-size: 16px; font-weight: 700; font-family: Georgia, serif; }
.pricing-grand-lbl small { font-size: 12px; font-weight: 400; color: var(--muted); font-family: inherit; }
.pricing-grand-val { font-size: 22px; font-weight: 700; font-family: Georgia, serif; color: var(--accent); }

/* ── INCLUDED ── */
.included-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.included-item { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; color: var(--ink2); }
.included-item-icon { font-size: 16px; flex-shrink: 0; }
.included-item span { line-height: 1.5; }

/* ── CTA FOOTER ── */
.cta {
  background: var(--dark);
  border-radius: var(--r);
  padding: 32px 36px;
  text-align: center;
}
.cta h2 { font-family: Georgia, serif; font-size: 24px; font-weight: 700; color: #fffef9; margin-bottom: 8px; }
.cta p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 24px; }
.cta-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.cta-btn-primary {
  display: inline-block;
  background: var(--orange);
  color: #fff;
  text-decoration: none;
  padding: 13px 32px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
}
.cta-btn-secondary {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fffef9;
  text-decoration: none;
  padding: 13px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
}
.cta-fine { font-size: 11px; color: rgba(255,255,255,0.35); }

/* ── ERROR ── */
.error-state {
  max-width: 520px;
  margin: 80px auto;
  text-align: center;
  padding: 0 24px;
}
.error-state h2 { font-family: Georgia, serif; font-size: 22px; font-weight: 700; margin-bottom: 12px; }
.error-state p { font-size: 14px; color: var(--muted2); line-height: 1.6; }

/* ── RESPONSIVE ── */
@media (max-width: 540px) {
  .nav { padding: 0 18px; }
  .container { padding: 24px 16px 80px; }
  .card { padding: 20px 18px; }
  .cover-company { font-size: 24px; }
  .stats-row { gap: 8px; }
  .stat-badge { min-width: 110px; padding: 16px 14px; }
  .stat-val { font-size: 22px; }
  .included-grid { grid-template-columns: 1fr; }
  .cta { padding: 28px 20px; }
  .screen-media { height: 180px; }
}
</style>
</head>
<body>

<!-- Rendered by JS below -->
<div id="root"></div>

<script>
/* ─────────────────────────────────────────
   Helpers
───────────────────────────────────────── */
const TYPE_LABEL = {
  billboard:   "Digital Billboard",
  gym:         "Gym Screen",
  cinema:      "Cinema Screen",
  gasstation:  "Gas Station",
  grocery:     "Grocery Store",
  healthcare:  "Medical Office",
  rideshare:   "Rideshare Interior",
  dining:      "Casual Dining",
  retail:      "Retail Screen",
  bar:         "Bar Screen",
  sports:      "Sports Venue",
  education:   "College Campus",
  residential: "Apartment Screen",
  airport:     "Airport Screen",
};

function fmtMoney(n) {
  return '$' + Math.round(n).toLocaleString('en-US');
}

function incLabel(inc) {
  if (inc === 'monthly') return { unit: 'month', short: '/mo' };
  if (inc === 'daily')   return { unit: 'day',   short: '/day' };
  return { unit: 'week', short: '/wk' };
}

function expiresDate(created) {
  const d = new Date(created + 'T00:00:00');
  d.setDate(d.getDate() + 7);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function osmSrc(lat, lng) {
  const pad = 0.003;
  return `https://www.openstreetmap.org/export/embed.html?bbox=${lng - pad},${lat - pad * 0.6},${lng + pad},${lat + pad * 0.6}&layer=mapnik&marker=${lat},${lng}`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ─────────────────────────────────────────
   Decode payload from ?d= param
───────────────────────────────────────── */
function loadProposal() {
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('d');
  if (!encoded) return null;
  try {
    const json = decodeURIComponent(escape(atob(encoded)));
    return JSON.parse(json);
  } catch (e) {
    return null;
  }
}

/* ─────────────────────────────────────────
   Render
───────────────────────────────────────── */
function renderError() {
  return `
    <nav class="nav">
      <div class="nav-logo">
        ${logoSVG()}
        <span class="nav-wordmark">NWA <span>Ads</span></span>
      </div>
    </nav>
    <div class="container">
      <div class="error-state">
        <h2>Proposal link is invalid</h2>
        <p>This link may be missing required data or was shared incorrectly. Please ask your NWA Ads contact to resend the proposal link.</p>
      </div>
    </div>`;
}

function logoSVG() {
  return `<svg width="24" height="24" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="14" y1="26" x2="50" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="32" x2="50" y2="32" stroke="#f0905a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="14" y1="38" x2="50" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

function renderScreenCard(s, qty, inc) {
  const lbl  = incLabel(inc);
  const total = s.unitRate * qty;
  const mediaHtml = s.img
    ? `<img src="${esc(s.img)}" alt="${esc(s.name)}" loading="lazy">`
    : `<iframe src="${esc(osmSrc(s.lat, s.lng))}" scrolling="no" title="Location: ${esc(s.name)}"></iframe>`;

  const photoBadge = s.img ? '📷 Screen photo' : '📍 Screen location';
  const typeLabel  = TYPE_LABEL[s.type] || (s.venue_type || s.type);

  return `
  <div class="screen-card">
    <div class="screen-media">
      ${mediaHtml}
      <div class="screen-media-gradient"></div>
      <div class="screen-type-badge">
        <span style="font-size:14px">${esc(s.icon || '')}</span>
        ${esc(typeLabel)}
      </div>
      <div class="screen-photo-badge">${photoBadge}</div>
      <div class="screen-overlay">
        <div class="screen-overlay-name">${esc(s.name)}</div>
        <div class="screen-overlay-area">📍 ${esc(s.area || '')}</div>
      </div>
    </div>
    <div class="screen-body">
      <div class="screen-stats">
        <div class="screen-stat">
          <div class="screen-stat-lbl">Weekly impr.</div>
          <div class="screen-stat-val">${esc(s.impr || (s.wkly_impr ? s.wkly_impr.toLocaleString() : '—'))}</div>
        </div>
        <div class="screen-stat">
          <div class="screen-stat-lbl">Rate</div>
          <div class="screen-stat-val accent">${fmtMoney(s.unitRate)}<small>${lbl.short}</small></div>
        </div>
        <div class="screen-stat">
          <div class="screen-stat-lbl">CPM</div>
          <div class="screen-stat-val">${s.cpm != null ? '$' + Number(s.cpm).toFixed(2) : '—'}</div>
        </div>
      </div>
      ${s.audience ? `<div class="screen-audience"><strong>Audience: </strong>${esc(s.audience)}</div>` : ''}
      <div class="screen-total">
        <span class="screen-total-lbl">Campaign total (${qty} ${lbl.unit}${qty !== 1 ? 's' : ''})</span>
        <span class="screen-total-val">${fmtMoney(total)}</span>
      </div>
    </div>
  </div>`;
}

function renderPricingRows(screens, qty, inc) {
  const lbl = incLabel(inc);
  return screens.map(s => `
    <div class="pricing-row">
      <div class="pricing-row-left">
        <span class="pricing-row-icon">${esc(s.icon || '')}</span>
        <div>
          <div class="pricing-row-name">${esc(s.name)}</div>
          <div class="pricing-row-sub">${esc(s.area || '')} · ${esc(s.impr || '')}</div>
        </div>
      </div>
      <div class="pricing-row-right">
        <div class="pricing-row-total">${fmtMoney(s.unitRate * qty)}</div>
        <div class="pricing-row-unit">${fmtMoney(s.unitRate)}${lbl.short}</div>
      </div>
    </div>`).join('');
}

function renderPage(d) {
  const screens = d.screens || [];
  const lbl     = incLabel(d.inc);
  const qty     = d.qty || 1;
  const expires = expiresDate(d.created || new Date().toISOString().slice(0,10));

  const totalWklyImpr = screens.reduce((a, s) => a + (s.wkly_impr || 0), 0);
  const imprStr = totalWklyImpr >= 1000 ? Math.round(totalWklyImpr / 1000) + 'K+' : totalWklyImpr.toLocaleString();
  const subUnit = screens.reduce((a, s) => a + (s.unitRate || 0), 0);
  const disc    = 0;
  const grand   = Math.round(subUnit * qty);

  document.title = d.company ? `Proposal for ${d.company} · NWA Ads` : 'Campaign Proposal · NWA Ads';

  return `
  <nav class="nav">
    <div class="nav-logo">
      ${logoSVG()}
      <span class="nav-wordmark">NWA <span>Ads</span></span>
    </div>
    <span class="nav-label">Campaign Proposal</span>
  </nav>

  <div class="banner">📋 PROPOSAL · Prices &amp; availability valid until ${expires}</div>

  <div class="container">

    <!-- Cover -->
    <div class="card">
      <div class="cover-eyebrow">Prepared for</div>
      <div class="cover-company">${esc(d.company || 'Your Company')}</div>
      ${d.contact ? `<div class="cover-contact">Attn: ${esc(d.contact)}</div>` : ''}
      ${d.note ? `
      <div class="cover-divider">
        <div class="cover-note-label">Personal note</div>
        <div class="cover-note">"${esc(d.note)}"</div>
        ${d.sender ? `<div class="cover-sender">— ${esc(d.sender)}</div>` : ''}
      </div>` : ''}
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-badge">
        <div class="stat-val">${screens.length}</div>
        <div class="stat-lbl">Screens</div>
      </div>
      <div class="stat-badge">
        <div class="stat-val">${imprStr}</div>
        <div class="stat-lbl">Weekly impressions</div>
      </div>
      <div class="stat-badge">
        <div class="stat-val">${qty} ${lbl.unit}${qty !== 1 ? 's' : ''}</div>
        <div class="stat-lbl">Campaign length</div>
      </div>
      <div class="stat-badge">
        <div class="stat-val accent">${fmtMoney(grand)}</div>
        <div class="stat-lbl">Est. total</div>
      </div>
    </div>

    <!-- Goal -->
    ${d.goal ? `
    <div class="goal-row">
      <span class="goal-eyebrow">Campaign goal</span>
      <span class="goal-chip">${esc(d.goal)}</span>
    </div>` : ''}

    <!-- Screen cards -->
    <div class="section-head">
      <h2>Selected screens</h2>
      <p>Each location was chosen to maximize reach to your target audience across NWA.</p>
    </div>

    ${screens.map(s => renderScreenCard(s, qty, d.inc)).join('')}

    <!-- Pricing breakdown -->
    <div class="card">
      <h3 style="font-family:Georgia,serif;font-size:18px;font-weight:700;margin-bottom:16px;">Investment breakdown</h3>
      ${renderPricingRows(screens, qty, d.inc)}
      <div class="pricing-summary">
        <div class="pricing-line">
          <span>Subtotal</span>
          <span>${fmtMoney(subUnit * qty)}</span>
        </div>
        <div class="pricing-grand">
          <span class="pricing-grand-lbl">
            Estimated total
            <small>(${qty} ${lbl.unit}${qty !== 1 ? 's' : ''})</small>
          </span>
          <span class="pricing-grand-val">${fmtMoney(grand)}</span>
        </div>
      </div>
    </div>

    <!-- What's included -->
    <div class="card">
      <h3 style="font-family:Georgia,serif;font-size:18px;font-weight:700;margin-bottom:14px;">What's included</h3>
      <div class="included-grid">
        ${[
          ['📸', 'Photo verification within 48 hrs of go-live'],
          ['📊', 'Weekly impression reports every Monday'],
          ['✅', 'Creative review & approval (same day)'],
          ['🌐', 'Web visit lift measurement'],
          ['📍', 'Geo attribution — exposed vs unexposed zips'],
          ['🚶', 'Foot traffic lift vs control group'],
        ].map(([icon, text]) => `
        <div class="included-item">
          <span class="included-item-icon">${icon}</span>
          <span>${esc(text)}</span>
        </div>`).join('')}
      </div>
    </div>

    <!-- CTA -->
    <div class="cta">
      <h2>Ready to book this campaign?</h2>
      <p>No payment now — confirm interest and we'll verify screen availability within 2 hours, then send a secure payment link.</p>
      <div class="cta-btns">

        <a href="mailto:hello@nwa-ads.com" class="cta-btn-secondary">✉ hello@nwa-ads.com</a>
      </div>

  </div>`;
}

(function boot() {
