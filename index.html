  <style>
    :root {
      --green:       #1f3d2a;
      --green-mid:   #2d5c3f;
      --accent:      #c8440a;
      --rust-light:  #e8935f;
      --ink:         #1a1714;
      --ink2:        #4a4540;
      --muted:       #8a8378;
      --border:      #ece7dd;
      --white:       #fffef9;
      --bg:          #f4f0e8;
      --warm:        #f9f6ee;
      --gold-border: #f0d9a8;
      --gold-bg:     #fffbf2;
      --gold-ink:    #5c4a1e;
      --serif:       Georgia, 'Times New Roman', serif;
      --sans:        'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-pill: 100px;
      --sh-sm: 0 1px 3px rgba(26,23,20,0.07),0 1px 2px rgba(26,23,20,0.06);
      --sh-md: 0 4px 16px rgba(26,23,20,0.09),0 2px 6px rgba(26,23,20,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.5; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--green);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .loading-logo { font-family: var(--serif); font-size: 22px; color: #fff; margin-bottom: 28px; letter-spacing: 0.02em; }
    .loading-logo em { font-style: normal; color: var(--rust-light); }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Invalid ── */
    #invalid {
      display: none; min-height: 100vh; background: var(--white);
      flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px;
    }
    .invalid-logo { font-family: var(--serif); font-size: 20px; color: var(--ink); margin-bottom: 32px; text-decoration: none; display: block; }
    .invalid-logo em { font-style: normal; color: var(--rust-light); }
    .invalid-h { font-family: var(--serif); font-size: 22px; margin-bottom: 10px; }
    .invalid-p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .invalid-back { color: var(--accent); font-weight: 600; font-size: 13px; text-decoration: none; }

    /* ── Proposal wrapper ── */
    #proposal { display: none; }

    /* 1. Header */
    .p-header { background: var(--green); padding: 32px 24px 36px; }
    .p-header-inner { max-width: 900px; margin: 0 auto; }
    .p-logo { font-family: var(--serif); font-size: 17px; color: #fff; margin-bottom: 24px; letter-spacing: 0.02em; text-decoration: none; display: inline-block; }
    .p-logo em { font-style: normal; color: var(--rust-light); }
    .p-h1 { font-family: var(--serif); font-size: clamp(22px,4vw,30px); color: #fff; line-height: 1.15; margin-bottom: 10px; letter-spacing: -0.01em; }
    .p-subhead { font-size: 13.5px; color: rgba(255,255,255,0.65); line-height: 1.55; }
    .p-expires { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 8px; }

    /* 2. Summary strip */
    .p-summary { display: grid; grid-template-columns: repeat(4,1fr); background: var(--white); border-bottom: 1px solid var(--border); }
    .sum-cell { padding: 18px 20px; border-right: 1px solid var(--border); }
    .sum-cell:last-child { border-right: none; }
    .sum-lbl { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 5px; }
    .sum-val { font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
    .sum-val.hi { color: var(--accent); }
    @media (max-width: 640px) {
      .p-summary { grid-template-columns: 1fr 1fr; }
      .sum-cell:nth-child(2) { border-right: none; }
      .sum-cell:nth-child(3) { border-top: 1px solid var(--border); }
      .sum-cell:nth-child(4) { border-top: 1px solid var(--border); }
    }

    /* 3. Objective banner */
    .p-obj { background: var(--warm); border-bottom: 1px solid var(--border); padding: 16px 24px; }
    .p-obj-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-start; }
    .obj-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .obj-text { font-size: 13px; color: var(--ink2); line-height: 1.55; }
    .obj-text strong { color: var(--ink); }

    /* ── Inner sections ── */
    .p-body { max-width: 900px; margin: 0 auto; padding: 28px 24px; }
    .p-body + .p-body { padding-top: 0; }
    .sec-head { font-family: var(--serif); font-size: 20px; font-weight: 700; margin-bottom: 16px; }

    /* 4. Map */
    .map-card { border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--sh-md); }
    .map-hdr { background: var(--green); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .map-hdr-title { font-family: var(--serif); font-size: 17px; color: #fff; }
    .map-toggle { display: flex; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; }
    .map-toggle-btn { border: none; background: transparent; padding: 5px 14px; font-size: 11.5px; font-weight: 600; font-family: inherit; color: rgba(255,255,255,0.55); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .map-toggle-btn.on { background: rgba(255,255,255,0.16); color: #fff; }
    #prop-map { height: 380px; }
    .map-foot { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    @media (max-width: 500px) { .map-foot { grid-template-columns: 1fr; } }
    .map-foot-card { background: var(--warm); border-radius: var(--r-md); padding: 14px 18px; box-shadow: var(--sh-sm); }
    .mfc-lbl { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 10px; }
    .mfc-stat { font-family: var(--serif); font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; color: var(--ink); }
    .mfc-sub  { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .legend-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .legend-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink2); }
    .legend-dot::before { content: ''; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: var(--c, #888); }

    /* 5. Inventory grid */
    .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
    .inv-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--sh-sm); }
    .inv-img { width: 100%; height: 108px; object-fit: cover; display: block; background: var(--warm); }
    .inv-img-fb { width: 100%; height: 108px; display: flex; align-items: center; justify-content: center; background: var(--warm); }
    .inv-body { padding: 10px 12px 12px; }
    .inv-eyebrow { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .inv-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .inv-type { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .inv-name { font-family: var(--serif); font-size: 13px; font-weight: 700; line-height: 1.25; margin-bottom: 3px; }
    .inv-area { font-size: 10.5px; color: var(--muted); margin-bottom: 8px; }
    .inv-price { font-family: var(--serif); font-size: 14px; font-weight: 700; color: var(--accent); border-top: 1px solid #f0ece5; padding-top: 7px; display: flex; align-items: baseline; gap: 4px; }
    .inv-price small { font-family: var(--sans); font-size: 10px; font-weight: 400; color: var(--muted); }
    .inv-feats { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
    .inv-feat { font-size: 9px; font-weight: 600; background: var(--warm); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }

    /* 6. Cost summary */
    .cost-box { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 20px 24px; box-shadow: var(--sh-sm); }
    .cost-line { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #f0ece5; font-size: 13px; color: var(--ink2); }
    .cost-line:last-child { border-bottom: none; }
    .cost-line strong { color: var(--ink); font-weight: 600; }
    .cost-total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 2px; border-top: 2px solid var(--border); margin-top: 4px; }
    .cost-total-lbl { font-family: var(--serif); font-size: 15px; font-weight: 700; }
    .cost-total-val { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--accent); }
    .disclaimer { background: var(--gold-bg); border: 1px solid var(--gold-border); border-left: 4px solid #c8860a; border-radius: var(--r-sm); padding: 14px 16px; font-size: 12.5px; line-height: 1.6; color: var(--gold-ink); margin-top: 14px; }

    /* 7. CTA footer */
    .cta-wrap { background: var(--green); border-radius: var(--r-xl); padding: 36px 32px 40px; text-align: center; }
    .cta-h { font-family: var(--serif); font-size: 22px; color: #fff; margin-bottom: 8px; }
    .cta-p { color: rgba(255,255,255,0.62); font-size: 13.5px; margin-bottom: 24px; }
    .cta-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-approve { background: var(--accent); color: #fff; border: none; border-radius: var(--r-pill); padding: 14px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn-approve:hover { opacity: 0.88; }
    .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ask { background: transparent; color: rgba(255,255,255,0.8); border: 1.5px solid rgba(255,255,255,0.28); border-radius: var(--r-pill); padding: 13px 26px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; }
    .cta-success { display: none; color: rgba(255,255,255,0.95); font-size: 15px; font-weight: 600; padding: 4px 0 2px; }

    /* Leaflet overrides */
    .leaflet-container { font-family: var(--sans) !important; }
    .leaflet-popup-content-wrapper { border-radius: var(--r-md) !important; box-shadow: var(--sh-md) !important; padding: 0 !important; overflow: hidden; }
    .leaflet-popup-content { margin: 0 !important; min-width: 160px; }
    .popup-inner { padding: 12px 14px; }
    .popup-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .popup-area { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .popup-price { font-family: var(--serif); font-size: 14px; font-weight: 700; color: var(--accent); }
    .leaflet-popup-tip { display: none; }
  </style>
</head>

function calcWeeks(rec) {
  if (rec.flight_start && rec.flight_end) {
    const ms = new Date(rec.flight_end) - new Date(rec.flight_start);
    return Math.max(1, Math.round(ms / (7 * 24 * 3600 * 1000)));
  }
  const qty = rec.qty || 2;
  const inc = rec.inc || 'weekly';
  if (inc === 'weekly')  return qty;
  if (inc === 'monthly') return qty * 4;
  if (inc === 'daily')   return Math.ceil(qty / 7);
  return qty;
}
function flightLabel(rec) {
  if (rec.flight_start && rec.flight_end) {
    const s = fmtDateShort(rec.flight_start);
    const e = fmtDateShort(rec.flight_end);
    return (s && e) ? s + ' – ' + e : '—';
  }
  const qty = rec.qty || 2;
  const inc = rec.inc || 'weekly';
  const label = { daily:'day', weekly:'wk', monthly:'mo' };
  return qty + ' ' + (label[inc] || inc) + (qty !== 1 ? 's' : '');
}

/* ══════════════ GOAL OBJECTIVE TEXT ══════════════ */
function objectiveText(rec) {
  const g = rec.goal || '';
  const prod = rec.product ? ` for <strong>${esc(rec.product)}</strong>` : '';
  const si = rec.sub_intent ? ` · <em>${esc(rec.sub_intent)}</em>` : '';
  if (g.includes('Walmart')) return `🎯 Targeted at <strong>Walmart & Sam's Club decision-makers</strong>${prod}${si} — screens filtered to 3 buyer concentration zones: Home Office corridor, Downtown Bentonville, and Pinnacle Hills.`;
  if (g.includes('Foot traffic') || g.includes('customers through')) return `📍 Drive foot traffic${prod} with hyper-local screens positioned closest to your business location.`;
  if (g.includes('Tech') || g.includes('Startup')) return `💡 Reaching the <strong>NWA Tech & Startup Scene</strong>${prod} — billboard-first across Bentonville, Rogers & Fayetteville, with gym & dining fills.`;
  return `📣 Multi-format brand awareness campaign${prod} across Northwest Arkansas.`;
}

/* ══════════════ MAIN ══════════════ */
async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id || !/^[0-9a-f-]{36}$/i.test(id)) { showInvalid(); return; }

  const { data, error } = await sbClient.from('campaigns').select('*').eq('id', id).single();
  if (error || !data) { showInvalid(); return; }

  renderProposal(data);
}

function showInvalid() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('invalid').style.display = 'flex';
}

/* ══════════════ RENDER ══════════════ */
function renderProposal(rec) {
  const cart = rec.cart || rec.screens || {};
  const cartItems = Object.values(cart);
  const weeks = calcWeeks(rec);
  const wklyTotal = cartItems.reduce((a, s) => a + (s.weeklyRate || 0), 0);
  const grandTotal = wklyTotal * weeks;
  const totalImpr = cartItems.reduce((a, s) => a + (s.wkly_impr || 0), 0) * weeks;
  const company = rec.company_name || 'Your Campaign';
  const product = rec.product ? ` · ${rec.product}` : '';
  const goal = rec.goal || 'Brand Awareness';
  const propId = rec.id;

  // --- expiry: 30 days from created_at ---
  let expiryStr = '';
  if (rec.created_at) {
    const exp = new Date(rec.created_at);
    exp.setDate(exp.getDate() + 30);
    expiryStr = 'Proposal valid until ' + exp.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
  }

  const prop = document.getElementById('proposal');
  prop.innerHTML = `
    <!-- 1. Header -->
    <div class="p-header">
      <div class="p-header-inner">
        <a href="https://nwa-ads.com" class="p-logo">NWA <em>Ads</em></a>
        <h1 class="p-h1">${esc(company)} Campaign Proposal</h1>
        <p class="p-subhead">${esc(goal)}${esc(product)}</p>
        ${expiryStr ? `<p class="p-expires">${esc(expiryStr)}</p>` : ''}
      </div>
    </div>

    <!-- 2. Summary strip -->
    <div class="p-summary">
      <div class="sum-cell">
        <div class="sum-lbl">Flight</div>
        <div class="sum-val">${esc(flightLabel(rec))}</div>
      </div>
      <div class="sum-cell">
        <div class="sum-lbl">Screens</div>
        <div class="sum-val">${cartItems.length}</div>
      </div>
      <div class="sum-cell">
        <div class="sum-lbl">Total Impressions</div>
        <div class="sum-val">${fmtK(totalImpr)}</div>
      </div>
      <div class="sum-cell">
        <div class="sum-lbl">Campaign Total</div>
        <div class="sum-val hi">${fmtMoney(grandTotal)}</div>
      </div>
    </div>

    <!-- 3. Objective -->
    <div class="p-obj">
      <div class="p-obj-inner">
        <span class="obj-icon">📋</span>
        <div class="obj-text">${objectiveText(rec)}</div>
      </div>
    </div>

    <!-- 4. Map -->
    <div class="p-body">
      <div class="map-card">
        <div class="map-hdr">
          <span class="map-hdr-title">Screen Locations</span>
          <div class="map-toggle">
            <button class="map-toggle-btn on" id="mtb-pins" onclick="setMapMode('pins')">Screens</button>
            ${rec.goal && rec.goal.includes('Walmart') ? '<button class="map-toggle-btn" id="mtb-strat" onclick="setMapMode(\'strategy\')">Strategy</button>' : ''}
          </div>
        </div>
        <div id="prop-map"></div>
      </div>
      <div class="map-foot">
        <div class="map-foot-card">
          <div class="mfc-lbl">Weekly Impressions</div>
          <div class="mfc-stat">${fmtK(totalImpr / Math.max(1, weeks))}</div>
          <div class="mfc-sub">per week across all screens</div>
        </div>
        <div class="map-foot-card">
          <div class="mfc-lbl">Venue Types</div>
          <div id="legend-items" class="legend-row"></div>
        </div>
      </div>
    </div>

    <!-- 5. Inventory -->
    <div class="p-body" style="padding-top:0">
      <div class="sec-head">Selected Screens</div>
      <div class="inv-grid" id="inv-grid"></div>
    </div>

    <!-- 6. Cost -->
    <div class="p-body" style="padding-top:0">
      <div class="sec-head">Investment Summary</div>
      <div class="cost-box">
        ${cartItems.map(s => `
          <div class="cost-line">
            <span>${esc(s.name || s.full_name || 'Screen')}</span>
            <strong>${fmtMoney(s.weeklyRate || 0)}<small style="font-weight:400;color:var(--muted);font-size:11px"> /wk</small></strong>
          </div>
        `).join('')}
        <div class="cost-line" style="margin-top:4px">
          <span>Weekly subtotal</span>
          <strong>${fmtMoney(wklyTotal)}/wk</strong>
        </div>
        <div class="cost-line">
          <span>Duration</span>
          <strong>${weeks} week${weeks !== 1 ? 's' : ''}</strong>
        </div>
        <div class="cost-total-row">
          <span class="cost-total-lbl">Campaign Total</span>
          <span class="cost-total-val">${fmtMoney(grandTotal)}</span>
        </div>
      </div>
      <div class="disclaimer">
        Pricing shown is estimated at standard rate card. Final invoice may vary based on venue availability, campaign length adjustments, and any custom negotiated rates. Impressions are estimates based on venue traffic data.
      </div>
    </div>

    <!-- 7. CTA -->
    <div class="p-body" style="padding-top:0">
      <div class="cta-wrap">
        <h3 class="cta-h">Ready to move forward?</h3>
        <p class="cta-p">Approve this proposal and our team will reach out within one business day to confirm dates and begin production.</p>
        <div class="cta-btns">
          <button class="btn-approve" id="btn-approve" onclick="approveProposal('${esc(propId)}')">✓ Approve this proposal</button>
          <a class="btn-ask" href="mailto:andrew@nwa-ads.com?subject=Re%3A%20${encodeURIComponent(company)}%20Proposal">Ask a question</a>
        </div>
        <div class="cta-success" id="cta-success">✓ Request received — we'll be in touch within one business day.</div>
      </div>
    </div>
  `;

  // Build legend
  const types = [...new Set(cartItems.map(s => s.venue_type || s.type || 'billboard'))];
  const legendEl = document.getElementById('legend-items');
  types.forEach(t => {
    const span = document.createElement('span');
    span.className = 'legend-dot';
    span.style.setProperty('--c', venueColor(t));
    span.textContent = t.replace(' (NEW)','').replace(/\s*\(In-Theater\)/,'');
    legendEl.appendChild(span);
  });

  // Build inventory cards
  const grid = document.getElementById('inv-grid');
  cartItems.forEach(s => {
    const vt = s.venue_type || s.type || 'billboard';
    const color = venueColor(vt);
    const hasImg = s.img && s.img.startsWith('http');
    const feats = [s.video && 'Video', s.audio && 'Audio', s.impr && 'Impression-based'].filter(Boolean);
    const div = document.createElement('div');
    div.className = 'inv-card';
    div.innerHTML = `
      ${hasImg
        ? `<img class="inv-img" src="${esc(s.img)}" alt="${esc(s.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="inv-img-fb" style="${hasImg ? 'display:none' : ''}">${makeIconHtml(vt, 42)}</div>
      <div class="inv-body">
        <div class="inv-eyebrow">
          <span class="inv-dot" style="background:${color}"></span>
          <span class="inv-type">${esc(vt.replace(' (NEW)',''))}</span>
        </div>
        <div class="inv-name">${esc(s.name || s.full_name || 'Screen')}</div>
        <div class="inv-area">${esc(s.area || '')}</div>
        <div class="inv-price">${fmtMoney(s.weeklyRate || 0)} <small>/wk</small></div>
        ${feats.length ? `<div class="inv-feats">${feats.map(f=>`<span class="inv-feat">${f}</span>`).join('')}</div>` : ''}
      </div>
    `;
    grid.appendChild(div);
  });

  // Init map
  initMap(cartItems, rec.goal || '');

  // Show
  document.getElementById('loading').style.display = 'none';
  prop.style.display = '';
}

/* ══════════════ MAP ══════════════ */
let propMap = null;
let stratLayers = null;
let pinLayers = null;
let mapMode = 'pins';

function initMap(cartItems, goal) {
  propMap = L.map('prop-map', { zoomControl: true, scrollWheelZoom: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    maxZoom: 18
  }).addTo(propMap);

  // Build pin layer
  pinLayers = L.layerGroup();
  const validItems = cartItems.filter(s => s.lat && s.lng);
  validItems.forEach(s => {
    const vt = s.venue_type || s.type || 'billboard';
    const icon = L.divIcon({
      className: '',
      html: makeIconHtml(vt, 34),
      iconSize:   [34, 34],
      iconAnchor: [17, 17],
    });
    const m = L.marker([s.lat, s.lng], { icon });
    m.bindPopup(`
      <div class="popup-inner">
        <div class="popup-name">${esc(s.name || 'Screen')}</div>
        <div class="popup-area">${esc(s.area || '')}</div>
        <div class="popup-price">${s.weeklyRate ? '$' + Math.round(s.weeklyRate).toLocaleString() + '/wk' : ''}</div>
      </div>
    `, { closeButton: false });
    pinLayers.addLayer(m);
  });
  pinLayers.addTo(propMap);

  // Build Walmart strategy layer
  if (goal.includes('Walmart')) {
    stratLayers = L.layerGroup();
    const ZONES = [
      { latlng: [36.3729, -94.2192], color: '#1f3d2a', label: 'Home Office' },
      { latlng: [36.3720, -94.2098], color: '#c8440a', label: 'Downtown Bentonville' },
      { latlng: [36.3085, -94.1814], color: '#c8440a', label: 'Pinnacle Hills' },
    ];
    ZONES.forEach(z => {
      L.circle(z.latlng, { radius: 2800, color: z.color, fillColor: z.color, fillOpacity: 0.08, weight: 2, opacity: 0.4 }).addTo(stratLayers);
    });
    // Connector lines
    L.polyline([[36.3729,-94.2192],[36.3720,-94.2098]], { color:'#1f3d2a', weight:3, opacity:0.35, dashArray:'6 4' }).addTo(stratLayers);
    L.polyline([[36.3720,-94.2098],[36.3085,-94.1814]], { color:'#c8440a', weight:3, opacity:0.35, dashArray:'6 4' }).addTo(stratLayers);
    // Also add pins on strategy view
    validItems.forEach(s => {
      const vt = s.venue_type || s.type || 'billboard';
      const icon = L.divIcon({
        className: '',
        html: makeIconHtml(vt, 28),
        iconSize:   [28, 28],
        iconAnchor: [14, 14],
      });
      L.marker([s.lat, s.lng], { icon }).addTo(stratLayers);
    });
  }

  // Fit map to pins
  if (validItems.length > 0) {
    const bounds = L.latLngBounds(validItems.map(s => [s.lat, s.lng]));
    propMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  } else {
    propMap.setView([36.36, -94.21], 11);
  }
}

window.setMapMode = function(mode) {
  mapMode = mode;
  document.querySelectorAll('.map-toggle-btn').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('mtb-' + mode);
  if (btn) btn.classList.add('on');

  if (!propMap) return;
  if (mode === 'pins') {
    if (stratLayers) propMap.removeLayer(stratLayers);
    if (pinLayers) pinLayers.addTo(propMap);
  } else {
    if (pinLayers) propMap.removeLayer(pinLayers);
    if (stratLayers) stratLayers.addTo(propMap);
    propMap.setView([36.355, -94.205], 12);
  }
};

/* ══════════════ APPROVE ══════════════ */
window.approveProposal = async function(id) {
  const btn = document.getElementById('btn-approve');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

  const { error } = await sbClient.from('campaigns').update({ status: 'pending_confirmation' }).eq('id', id);

  if (btn) btn.style.display = 'none';
  const successEl = document.getElementById('cta-success');
  if (successEl) successEl.style.display = 'block';

  if (error) console.error('Approve error:', error);
};

/* ══════════════ BOOT ══════════════ */
init();
</script>
