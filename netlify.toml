[build]
  command = "node scripts/build-check.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/book"
  to = "/book.html"
  status = 200

[[redirects]]
  from = "/proposal"
  to = "/proposals/index.html"
  status = 200

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/book.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Branch deploy for proposals branch
[context.proposals]
  command = "echo 'Proposals branch — no build needed'"
  publish = "."
