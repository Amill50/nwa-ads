# .github/workflows/test.yml
# NWA Ads — Automated test pipeline
# Runs on every push to main and on pull requests

name: NWA Ads Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ── Unit Tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── E2E Tests ─────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: unit-tests  # only run E2E if unit tests pass

    strategy:
      fail-fast: false
      matrix:
        project: [desktop-chrome, mobile-safari, mobile-chrome]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project == 'desktop-chrome' && 'chromium' || matrix.project == 'mobile-safari' && 'webkit' || 'chromium' }}

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          TEST_URL: https://nwa-ads.com

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7
